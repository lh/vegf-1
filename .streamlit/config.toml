[theme]
primaryColor = "#FF5A5F"
backgroundColor = "#F0F2F6"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#262730"
font = "sans serif"

[server]
# Don't specify port - let Streamlit Cloud choose
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
# Don't specify serverAddress for cloud deployment

[runner]
fastReruns = true

# Removed deprecated option: showPyplotGlobalUse